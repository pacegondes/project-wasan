<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <!-- Optimasi untuk mobile agar tidak kaku saat di-zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Portal Wali Santri | MTs Amtsilati</title>
  <link rel="icon" href="https://i.ibb.co.com/1fHCTtJ5/logo.png" />
  
  <style>
    /* Menggunakan font yang sama dengan UI Utama */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap');

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #f8fafc; /* Slate 50 */
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan Dynamic Viewport Height untuk mobile */
      position: relative;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Loader bergaya Modern/Minimalist */
    .loader-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #f1f5f9;
      border-top: 3px solid #10b981; /* Emerald 500 */
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 10px;
      font-weight: 800;
      color: #94a3b8; /* Slate 400 */
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Logo kecil di bawah loader agar lebih branding */
    .loader-logo {
      position: absolute;
      bottom: 40px;
      width: 32px;
      opacity: 0.3;
    }
  </style>
</head>
<body>

  <div class="iframe-container">
    <!-- Loading Screen -->
    <div id="loader" class="loader-wrapper">
      <div class="spinner"></div>
      <div class="loading-text">Menyiapkan Portal Santri...</div>
      <img src="https://i.ibb.co.com/1fHCTtJ5/logo.png" class="loader-logo" alt="Amtsilati">
    </div>

    <!-- Iframe dengan parameter page=wali -->
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbzC6J2FBEnglLQJQK9pO6VwzZI2LLqBZJq_UB0VMqEKRKs_8XB8rwe3J76xhpZb1aq1/exec?page=wali"
      scrolling="yes"
      allowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;"
      onload="removeLoader()">
    </iframe>
  </div>

  <script>
    function removeLoader() {
      const loader = document.getElementById('loader');
      const iframe = document.getElementById('app');
      
      // Delay sedikit agar aset di dalam iframe selesai me-render UI-nya
      setTimeout(() => {
        loader.style.opacity = '0';
        iframe.style.opacity = '1';
        
        // Hapus loader dari DOM setelah transisi selesai agar hemat RAM
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      }, 800);
    }
  </script>
</body>
</html>
